      <div id="vn-line">这节车厢坐满了人，却安静得没有一丝呼吸声。只有最角落那位穿<span class="r">红</span>的，背对着你——那片红，比周围<span class="r">暗了一号</span>。</div>

  <script>
  (function(){
    // ==========================================
    // 1. Web Audio API 轨道环境音合成器
    // ==========================================
    class MidnightSynth {
        constructor() {
            this.ctx = null;
            this.baseHum = [];
            this.baseHumGain = null;
            this.isPlaying = false;
            this.screechTimer = null;
            this.clickTimer = null;
            this.bellTimer = null;
            this.heartbeatTimer = null;
            this.activeOscillators = [];
            this.windNode = null;
            this.windLfo = null;
        }

        init() {
            if (this.ctx) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.warn("当前浏览器不支持 Web Audio API", e);
            }
        }

        start() {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            if (this.isPlaying) return;

            // 1. 基准电机低鸣声
            const osc1 = this.ctx.createOscillator();
            const osc2 = this.ctx.createOscillator();
            const humGain = this.ctx.createGain();
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(55, this.ctx.currentTime); 
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(55.3, this.ctx.currentTime); 

            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(70, this.ctx.currentTime);
            humGain.gain.setValueAtTime(0.04, this.ctx.currentTime); 

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(humGain);
            humGain.connect(this.ctx.destination);

            osc1.start();
            osc2.start();

            const lfo = this.ctx.createOscillator();
            const lfoGain = this.ctx.createGain();
            lfo.frequency.setValueAtTime(0.4, this.ctx.currentTime); 
            lfoGain.gain.setValueAtTime(0.01, this.ctx.currentTime);
            lfo.connect(lfoGain);
            lfoGain.connect(humGain.gain);
            lfo.start();

            this.baseHum = [osc1, osc2, lfo];
            this.baseHumGain = humGain;

            // 2. 恐怖幽灵冷风合成 (白噪声 + 带通滤波扫频)
            try {
                const bufferSize = this.ctx.sampleRate * 2;
                const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                noise.loop = true;

                const windFilter = this.ctx.createBiquadFilter();
                windFilter.type = 'bandpass';
                windFilter.Q.setValueAtTime(3.5, this.ctx.currentTime);

                const windLfo = this.ctx.createOscillator();
                windLfo.frequency.setValueAtTime(0.06, this.ctx.currentTime); // 极慢扫频
                const windLfoGain = this.ctx.createGain();
                windLfoGain.gain.setValueAtTime(200, this.ctx.currentTime);

                windFilter.frequency.setValueAtTime(380, this.ctx.currentTime);

                windLfo.connect(windLfoGain);
                windLfoGain.connect(windFilter.frequency);

                const windGain = this.ctx.createGain();
                windGain.gain.setValueAtTime(0.007, this.ctx.currentTime);

                noise.connect(windFilter);
                windFilter.connect(windGain);
                windGain.connect(this.ctx.destination);

                noise.start();
                windLfo.start();

                this.windNode = noise;
                this.windLfo = windLfo;
            } catch(e) {
                console.warn("Wind synth failed", e);
            }

            this.isPlaying = true;

            // 3. 循环调度其他元素
            this.scheduleClickClack();
            this.scheduleScreech();
            this.scheduleBell();
            this.scheduleHeartbeat();
        }

        stop() {
            if (!this.isPlaying) return;
            if (this.baseHum.length) {
                this.baseHum.forEach(osc => { try { osc.stop(); } catch(e){} });
                this.baseHum = [];
            }
            if (this.windNode) {
                try { this.windNode.stop(); } catch(e){}
                this.windNode = null;
            }
            if (this.windLfo) {
                try { this.windLfo.stop(); } catch(e){}
                this.windLfo = null;
            }
            if (this.activeOscillators.length) {
                this.activeOscillators.forEach(osc => { try { osc.stop(); } catch(e){} });
                this.activeOscillators = [];
            }
            clearTimeout(this.screechTimer);
            clearTimeout(this.clickTimer);
            clearTimeout(this.bellTimer);
            clearTimeout(this.heartbeatTimer);
            this.isPlaying = false;
        }

        scheduleClickClack() {
            if (!this.isPlaying) return;
            this.clickTimer = setTimeout(() => {
                this.playClickClackSound();
                this.scheduleClickClack();
            }, 2500 + Math.random() * 2000);
        }

        playClickClackSound() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            this.triggerClick(now, 0.03);
            this.triggerClick(now + 0.12, 0.02);
            this.triggerClick(now + 0.35, 0.02);
        }

        triggerClick(time, volume) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(60, time);
            osc.frequency.exponentialRampToValueAtTime(10, time + 0.06);
            gain.gain.setValueAtTime(volume, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            this.activeOscillators.push(osc);
            osc.start(time);
            osc.stop(time + 0.07);
        }

        scheduleScreech() {
            if (!this.isPlaying) return;
            this.screechTimer = setTimeout(() => {
                this.playScreechSound();
                this.scheduleScreech();
            }, 16000 + Math.random() * 12000);
        }

        playScreechSound() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            const duration = 1.2 + Math.random() * 1.0;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.linearRampToValueAtTime(520, now + duration);
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(700, now);
            filter.Q.setValueAtTime(5, now);

            gain.gain.setValueAtTime(0.001, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.4); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration); 

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            this.activeOscillators.push(osc);
            osc.start(now);
            osc.stop(now + duration);
        }

        scheduleBell() {
            if (!this.isPlaying) return;
            this.bellTimer = setTimeout(() => {
                this.playHauntingBell();
                this.scheduleBell();
            }, 8000 + Math.random() * 8000);
        }

        playHauntingBell() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            const freq = 110 + Math.random() * 60; 
            
            const osc1 = this.ctx.createOscillator();
            const osc2 = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(freq, now);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 1.618, now); 
            
            gain.gain.setValueAtTime(0.0, now);
            gain.gain.linearRampToValueAtTime(0.015, now + 0.15); 
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 6.0); 
            
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(350, now);
            
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            
            this.activeOscillators.push(osc1, osc2);
            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 6.1);
            osc2.stop(now + 6.1);
        }

        scheduleHeartbeat() {
            if (!this.isPlaying) return;
            this.heartbeatTimer = setTimeout(() => {
                this.playHeartbeat();
                this.scheduleHeartbeat();
            }, 1400);
        }

        playHeartbeat() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            
            const playPulse = (delay, volume) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(45, now + delay); 
                osc.frequency.exponentialRampToValueAtTime(25, now + delay + 0.25);
                
                gain.gain.setValueAtTime(0.0, now + delay);
                gain.gain.linearRampToValueAtTime(volume, now + delay + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.25);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                this.activeOscillators.push(osc);
                osc.start(now + delay);
                osc.stop(now + delay + 0.26);
            };
            
            playPulse(0, 0.07);
            playPulse(0.24, 0.05);
        }

        playDeathSound(deathType) {
            this.stop();
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            this.isPlaying = true;
            const now = this.ctx.currentTime;

            if (deathType === 'death_red') {
                // 红色禁忌：尖锐寒冷的结晶音，伴随高频微颤
                const freqs = [1500, 1800, 2200, 2600];
                freqs.forEach((f) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    
                    const lfo = this.ctx.createOscillator();
                    const lfoGain = this.ctx.createGain();
                    lfo.frequency.setValueAtTime(15, now);
                    lfoGain.gain.setValueAtTime(0.005, now);
                    
                    gain.gain.setValueAtTime(0.0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);
                    
                    lfo.connect(lfoGain);
                    lfoGain.connect(gain.gain);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    this.activeOscillators.push(osc, lfo);
                    osc.start(now);
                    lfo.start(now);
                    osc.stop(now + 4.1);
                    lfo.stop(now + 4.1);
                });
            } else if (deathType === 'death_seller') {
                // 乘务员车票：深渊下滑的警报锯齿波，伴随纸张冥币燃烧的噼啪声
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(30, now + 3.0);
                
                const bufferSize = this.ctx.sampleRate * 3;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() > 0.985 ? (Math.random() * 2 - 1) * 0.4 : 0;
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.03, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 3.0);
                
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.0);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                noise.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                
                this.activeOscillators.push(osc);
                osc.start(now);
                osc.stop(now + 3.1);
                noise.start(now);
                noise.stop(now + 3.1);
            } else if (deathType === 'death_window') {
                // 鬼手破窗：高频玻璃碎裂白噪声冲击，紧随沉闷的坠入深渊低音震荡
                const bufferSize = this.ctx.sampleRate * 0.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(3200, now);
                
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.12, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
                
                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                
                const rumble = this.ctx.createOscillator();
                const rumbleGain = this.ctx.createGain();
                rumble.type = 'triangle';
                rumble.frequency.setValueAtTime(80, now);
                rumble.frequency.linearRampToValueAtTime(35, now + 2.5);
                
                rumbleGain.gain.setValueAtTime(0.15, now);
                rumbleGain.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);
                
                rumble.connect(rumbleGain);
                rumbleGain.connect(this.ctx.destination);
                
                this.activeOscillators.push(rumble);
                noise.start(now);
                noise.stop(now + 0.6);
                rumble.start(now);
                rumble.stop(now + 2.6);
            } else {
                // 功亏一篑/最终制动：不和谐的群魔乱舞，频率在0.3秒内急剧冲高尖叫
                const freqs = [650, 780, 910, 1050];
                freqs.forEach((f) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    
                    const lfo = this.ctx.createOscillator();
                    const lfoGain = this.ctx.createGain();
                    lfo.frequency.setValueAtTime(30, now);
                    lfoGain.gain.setValueAtTime(50, now);
                    
                    osc.frequency.setValueAtTime(f, now);
                    osc.frequency.exponentialRampToValueAtTime(f * 1.4, now + 0.35);
                    
                    gain.gain.setValueAtTime(0.0, now);
                    gain.gain.linearRampToValueAtTime(0.05, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);
                    
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    this.activeOscillators.push(osc, lfo);
                    osc.start(now);
                    lfo.start(now);
                    osc.stop(now + 2.6);
                    lfo.stop(now + 2.6);
                });
            }
        }

        playTrueWinBGM() {
            this.stop();
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            this.isPlaying = true;
            const now = this.ctx.currentTime;
            
            // 温暖的 G 大调琶音旋律，象征拂晓生还的朝阳
            const notes = [
                { freq: 392.00, time: 0.0 },  // G4
                { freq: 493.88, time: 0.25 }, // B4
                { freq: 587.33, time: 0.5 },  // D5
                { freq: 783.99, time: 0.75 }, // G5
                
                { freq: 523.25, time: 1.5 },  // C5
                { freq: 659.25, time: 1.75 }, // E5
                { freq: 783.99, time: 2.0 },  // G5
                { freq: 1046.50, time: 2.25 },// C6
                
                { freq: 587.33, time: 3.5 },  // D5
                { freq: 783.99, time: 3.75 }, // G5
                { freq: 880.00, time: 4.0 },  // A5
                { freq: 1174.66, time: 4.25 },// D6
                
                { freq: 783.99, time: 5.5 }   // G5 (终场长钟音)
            ];

            notes.forEach(n => {
                const osc1 = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(n.freq, now + n.time);
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(n.freq * 2.0, now + n.time);
                
                gain.gain.setValueAtTime(0.0, now + n.time);
                gain.gain.linearRampToValueAtTime(0.025, now + n.time + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + n.time + 4.5);
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, now + n.time);
                
                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                this.activeOscillators.push(osc1, osc2);
                osc1.start(now + n.time);
                osc2.start(now + n.time);
                osc1.stop(now + n.time + 4.6);
                osc2.stop(now + n.time + 4.6);
            });
        }

        playNormalWinBGM() {
            this.stop();
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            this.isPlaying = true;
            const now = this.ctx.currentTime;
            
            // 正常的虚假结局：前段温和明亮，但在 3.5s 时大面积变调（转入不和谐的 C# 微小调，暗示仍在此地）
            const notes = [
                { freq: 392.00, time: 0.0 },  // G4
                { freq: 493.88, time: 0.25 }, // B4
                { freq: 587.33, time: 0.5 },  // D5
                { freq: 783.99, time: 0.75 }, // G5
                
                { freq: 523.25, time: 1.5 },  // C5
                { freq: 659.25, time: 1.75 }, // E5
                { freq: 783.99, time: 2.0 },  // G5
                { freq: 1046.50, time: 2.25 },// C6
                
                { freq: 554.37, time: 3.5, dissonant: true },  // C#5 (三全音偏音，极度不安)
                { freq: 698.46, time: 3.8, dissonant: true }   // F5
            ];

            notes.forEach(n => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = n.dissonant ? 'sawtooth' : 'sine';
                osc.frequency.setValueAtTime(n.freq, now + n.time);
                
                gain.gain.setValueAtTime(0.0, now + n.time);
                gain.gain.linearRampToValueAtTime(n.dissonant ? 0.035 : 0.02, now + n.time + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + n.time + 4.0);
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(n.dissonant ? 250 : 800, now + n.time);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                this.activeOscillators.push(osc);
                osc.start(now + n.time);
                osc.stop(now + n.time + 4.1);
            });
        }
    }

        text: () => "你顶着刺骨的阴凉，一把抱住缩在角落里的红衣人。那身红衣散发出了比干冰还要彻骨十倍的冷气，你感觉全身的血液几乎都要冻结。\n\n然而，当外面拍窗的无数双惨白断手企图击穿玻璃时，在接触到这股极致阴寒的一瞬间，竟仿佛触电般痛苦地缩了回去！红衣人幽幽地侧过头，用完全没有眼白的声音对你轻语：『……好冷……谢谢你，陪着我……』",
        options: () => {
          return [
            { text: "🚪 乘外面那些鬼手退去，迅速拉开门前往第四车厢", next: "car3_heaven_survived" }
          ];
        }
      },
      car3_heaven_glow: {
        bg: "heaven_station.png",
        text: () => "你闭上双眼！强光和刺耳的“天堂站”报站广播几乎穿透了你的耳膜。整节车厢仿佛飘进了耀眼、滚烫却阴凉的白雾之中，窗外全是刺目的白色微尘！\n\n你强忍着想要睁眼窥探的冲动，默数着心跳……",
        options: () => {
          return [
            { text: "🚪 听到刹车风管排气声后，慢慢睁开眼挪向前方车厢", next: "car3_heaven_survived" }
          ];
        }
      },
      car3_heaven_survived: {
        bg: "brake_lever.png",
        text: () => {
          let base = "雾气散去。你睁开眼，已经来到了【第四节车厢】。这里一片死寂，前面的【驾驶室】门旁挂着一个巨大的红色【紧急制动阀】。";
          if (gameState.has_note && gameState.has_badge) {
            base += "\n\n<span class=\"gold\">（目前你集齐了：[纸条] 和 [工牌]。脑海中，售票员和红衣乘客的话交相呼应。事情似乎并没有拉下阀门那么简单……）</span>";
          }
          return base;
        },
        options: () => {
          const opts = [
            { text: "🛑 闭上眼睛，凭感觉死死拉下制动阀", next: "win_normal" },
            { text: "👀 睁大眼睛看清局势，再去拉制动阀", next: "death_final" }
          ];
          if (gameState.has_note && gameState.has_badge) {
            opts.push({ text: "🌀 看穿谎言：任凭冷风吹拂，拒绝拉下制动阀，静坐等待列车自行停下", next: "win_true" });
          }
          return opts;
        }
      },
      win_normal: {
        bg: "win_subway.png", 
        text: () => {
          gameState.runs_completed++;
          saveGame();
          return "【正常结局 - 破碎梦魇】\n\n刺耳的刹车声响彻整列车厢，那些低语、阴冷和鬼影瞬间化为粉碎。\n\n暖洋洋的阳光洒在你脸上，车门缓缓打开，外面是阳光明媚的普通地铁站。广播里传来干净的声音：『终点站到了，欢迎回家。』\n\n你松了一口气走下车。然而，当你下意识伸手入怀，却摸到了那张在车厢里捡到的、揉成一团的碎纸条。上面不知何时多了一行滴血的字：\n\n『……不要相信阳光，这里，其实是第五节车厢。』";
        },
        options: () => []
      },
      win_true: {
        bg: "win_subway.png", 
        text: () => {
          gameState.runs_completed++;
          saveGame();
          setTimeout(() => { unlockAchievement('TRUE_WIN'); }, 1000);
          return "【真结局 - 莫比乌斯解脱】\n\n你双手抱胸，静静地靠在座椅上。周围的鬼哭狼嚎、甚至顶灯的闪烁都开始疯狂地撕扯你的理智。但是，你记起了乘务员死前的哭诉——拉动阀门，这辆庞然大物才会醒来捕猎！\n\n终于，4:55，伴随一声沉闷的空气排气声，列车竟缓缓停稳了。窗外的漆黑像潮水般退去，取而代之的是你熟悉的清晨街道。\n\n红衣乘客缓缓起身，第一次转过头——那是一张清秀、温和的普通女学生脸庞。她向你深深鞠了一躬，和满车化为白雾 of 乘客一起飘散远去。你推开没有上锁的列车门，真正踏上了人间的土地。游戏通关！";
        },
        options: () => []
      },
      death_red: {
        bg: "unspeakable_entity.png",
        text: () => {
          setTimeout(() => { unlockAchievement('RED_TALK'); }, 1000);
          return "【死亡 - 红色禁忌】\n\n那身红缓缓转了过来。你先看见的不是脸，是笑——一个咧到耳根、却没有眼睛的笑。你感觉自己的身体迅速变冷，也变成了一具无法呼吸、只能低头坐在车厢里的雕塑……";
        },
        options: () => []
      },
      death_seller: {
        bg: "unspeakable_entity.png",
        text: () => "【死亡 - 车票陷阱】\n\n乘务员咧开嘴笑了，那是一张属于溺死之人的苍白脸庞。你递过去的钱瞬间变成了冥币，你拿到的车票迅速在你的皮肤上蔓延成焦黑的灰烬。你成为了列车的新燃料。",
        options: () => []
      },
      death_window: {
        bg: "unspeakable_entity.png",
        text: () => "【死亡 - 窥视深渊】\n\n当你望向窗外的一瞬间，车窗上的白手猛地击碎了玻璃！无数冰冷的手瞬间死死扼住了你的喉咙，将你拽入了窗外无尽的深渊黑暗中……",
        options: () => []
      },
      death_final: {
        bg: "unspeakable_entity.png",
        text: () => "【死亡 - 功亏一篑】\n\n你睁开了双眼。黑暗中无数张扭曲撕裂的鬼脸贴在你眼前，尖叫着冲入你的眼眶。你的手在碰到阀门的一瞬间彻底失去了温度……",
        options: () => []
      }
    };

    const scene = document.getElementById('vn-scene');
    const death = document.getElementById('vn-death');
    const line = document.getElementById('vn-line');
    const dot = document.getElementById('vn-dot');
    const statusTxt = document.getElementById('status-txt');
    const nameTag = document.getElementById('vn-name');
    const optsBox = document.getElementById('vn-opts');
    const toggleAmbient = document.getElementById('toggle-ambient');
    const btnTopReset = document.getElementById('vn-skip');

    const welcomeScreen = document.getElementById('vn-welcome');
    const btnEnter = document.getElementById('btn-enter');

    // 🚀 点击检票，完美解锁并激活音频
    btnEnter.addEventListener('click', () => {
      synth.init();
      synth.start();
      toggleAmbient.innerText = "音频: 开";
      
      // 淡出遮罩层
      welcomeScreen.style.opacity = '0';
      setTimeout(() => {
        welcomeScreen.style.display = 'none';
      }, 800);
    });

    function unlockAudio() {
        synth.init();
        if (synth.ctx && synth.ctx.state === 'suspended') {
            synth.ctx.resume();
        }
    }

    function triggerReset() {
      death.classList.remove('on');
      dot.style.color = '#5a9a5a';
      statusTxt.innerText = '安全';
      
      if (synth.isPlaying) {
          synth.stop();
          synth.start();
      }
      
      showScene('car1_init');
    }

    btnTopReset.onclick = triggerReset;

    toggleAmbient.addEventListener('click', () => {
        unlockAudio(); 
        if (synth.isPlaying) {
            synth.stop();
            toggleAmbient.innerText = "音频: 关";
        } else {
            synth.start();
            toggleAmbient.innerText = "音频: 开";
        }
    });

    let textTimer = null;
    let isTyping = false;
    let currentFullText = "";
    let currentCallback = null;
    let currentElement = null;

    function typeWriter(element, text, speed, callback) {
      clearTimeout(textTimer);
      element.innerHTML = "";
      let i = 0;
      isTyping = true;
      currentFullText = text;
      currentCallback = callback;
      currentElement = element;
      
      const panel = document.getElementById('vn-panel');
      if (panel) panel.style.cursor = 'pointer';

      function type() {
        if (i < text.length) {
          if (text.charAt(i) === '<') {
            let tagEnd = text.indexOf('>', i);
            if (tagEnd !== -1) {
              element.innerHTML += text.substring(i, tagEnd + 1);
              i = tagEnd + 1; 
            } else {
              element.innerHTML += text.charAt(i);
              i++;
            }
          } else {
            element.innerHTML += text.charAt(i);
            i++;
          }
          textTimer = setTimeout(type, speed);
        } else {
          isTyping = false;
          if (panel) panel.style.cursor = 'default';
          const cb = currentCallback;
          currentCallback = null;
          if (cb) cb();
        }
      }
      type();
    }

    function skipTypewriter() {
      if (!isTyping || !currentElement) return;
      clearTimeout(textTimer);
      isTyping = false;
      
      const panel = document.getElementById('vn-panel');
      if (panel) panel.style.cursor = 'default';

      currentElement.innerHTML = currentFullText;
      const cb = currentCallback;
      currentCallback = null;
      if (cb) cb();
    }

    document.getElementById('vn-panel').addEventListener('click', (e) => {
      if (e.target.closest('.vn-opt') || e.target.closest('.vn-mini') || e.target.closest('.tree-btn')) {
        return;
      }
      if (isTyping) {
        skipTypewriter();
      }
    });

    function triggerAshEffect() {
      let container = document.getElementById('ash-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'ash-container';
        document.getElementById('vn').appendChild(container);
      }
      container.innerHTML = ''; 
      container.style.opacity = '1';
      
      const particleCount = 45;
      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement('div');
        p.className = 'ash-particle';
        const size = Math.random() * 5 + 2; 
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${Math.random() * 100}vw`;
        
        const duration = Math.random() * 4 + 3.5; 
        const delay = Math.random() * 3.5; 
        p.style.animationDuration = `${duration}s`;
        p.style.animationDelay = `${delay}s`;
        
        if (Math.random() > 0.5) {
          p.style.borderRadius = '50%';
        }
        container.appendChild(p);
      }
      
      setTimeout(() => {
        container.style.transition = 'opacity 2.5s ease-out';
        container.style.opacity = '0';
        setTimeout(() => {
          container.innerHTML = '';
          container.style.transition = 'none';
          container.style.opacity = '1';
        }, 2500);
      }, 7500);
    }

    function showScene(sceneKey) {
      unlockAudio(); 
      clearTimeout(textTimer); 
      isTyping = false;
      
      if (sceneKey === 'win_true') {
        if (synth.isPlaying) synth.playTrueWinBGM();
      } else if (sceneKey === 'win_normal') {
        if (synth.isPlaying) synth.playNormalWinBGM();
      } else if (sceneKey === 'car2_badge_ash') {
        triggerAshEffect();
      }
      
      const node = STORY_NODES[sceneKey];
      if (!node) return;

      const currentBg = typeof node.bg === 'function' ? node.bg() : node.bg;
      if (currentBg) {
        scene.style.backgroundImage = `url('${currentBg}?v=4.44')`;
      }

      const parsedText = typeof node.text === 'function' ? node.text() : node.text;

      if (sceneKey.startsWith('death')) {
        gameState.deaths_count++;
        saveGame();
        setTimeout(() => { unlockAchievement('FIRST_DEATH'); }, 1500);

        death.classList.add('on');
        dot.style.color = '#e02626';
        statusTxt.innerText = '异常/已死亡';
        
        if (synth.isPlaying) {
            synth.playDeathSound(sceneKey);
        }
        
        typeWriter(line, parsedText, 10, () => {
          optsBox.innerHTML = '<button class="vn-opt danger ultimate-restart" id="btn-restart">⚠️ 坠入深渊，点击此处循环重置 ⚠️</button>';
          document.getElementById('btn-restart').onclick = triggerReset;
        });
        return;
      }

      optsBox.innerHTML = ''; 
      const safeText = parsedText.replace(/\n/g, '<br>');
      
      typeWriter(line, safeText, 15, () => {
        if (sceneKey === 'win_normal' || sceneKey === 'win_true') {
          dot.style.color = '#5a9a5a';
          statusTxt.innerText = '已安全';
          
          if (sceneKey === 'win_normal') {
            // 虚假结局打印完文字后显露出惊悚真相：背景换为鬼脸，状态灯变红，屏幕轻微震颤
            scene.style.backgroundImage = "url('unspeakable_entity.png?v=4.44')";
            dot.style.color = '#e02626';
            statusTxt.innerText = '异常/未逃离';
            document.getElementById('vn').animate([
              { transform: 'translate(1px, 1px) rotate(0deg)' },
              { transform: 'translate(-2px, -3px) rotate(-1deg)' },
              { transform: 'translate(2px, 2px) rotate(1deg)' },
              { transform: 'translate(0px, 0px) rotate(0deg)' }
            ], { duration: 300 });
          }
          
          optsBox.innerHTML = `
            <button class="vn-opt ultimate-restart" style="border-color:#5a9a5a !important; box-shadow: 0 0 20px rgba(100,223,223,0.6) !important; background: linear-gradient(180deg, #0a3a3a, #051a1a) !important;" id="btn-win-restart">✨ 重新回到循环起点 ✨</button>
            <div class="tree-title">🌀 量子纠缠 · 剧情节点回溯</div>
            <div class="tree-grid">
              <button class="tree-btn" onclick="window.jumpToScene('car1_init')">📍 初始车厢一 (4:44)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car2_transition')">📍 车门交接 (工牌)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car2_init')">📍 诡异车厢二 (买票)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car3_init')">📍 尖叫车厢三 (鬼手)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car3_heaven_survived')">📍 判定车厢四 (制动)</button>
            </div>
          `;
          document.getElementById('btn-win-restart').onclick = triggerReset;
          return;
        }

        const options = typeof node.options === 'function' ? node.options() : node.options;
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'vn-opt';
          if (opt.text.includes('🚨') || opt.text.includes('💵')) {
            btn.classList.add('danger');
          }
          btn.innerHTML = opt.text;
          btn.onclick = () => showScene(opt.next);
          optsBox.appendChild(btn);
        });
      });

      if (sceneKey === 'car1_init' || sceneKey === 'car1_search') {
        nameTag.innerText = '车厢一 · 4:44';
      } else if (sceneKey === 'car2_transition' || sceneKey === 'car2_transition_badge') {
        nameTag.innerText = '车门交接处';
      } else if (sceneKey === 'car2_init' || sceneKey === 'car2_badge_survive' || sceneKey === 'car2_badge_ash') {
        nameTag.innerText = '车厢二 · 4:46';
      } else if (sceneKey === 'car3_init' || sceneKey === 'car3_heaven_glow' || sceneKey === 'car3_red_survive') {
        nameTag.innerText = '车厢三 · 4:48';
      } else if (sceneKey === 'car3_heaven_survived') {
        nameTag.innerText = '车厢四 · 4:50';
      }
      
      document.getElementById('vn-panel').scrollTop = 0;
    }

    window.jumpToScene = function(sceneKey) {
      death.classList.remove('on');
      dot.style.color = '#5a9a5a';
      statusTxt.innerText = 'safe';
      showScene(sceneKey);
    };

    showScene('car1_init');
  })();
  </script>
</div>
