    // ==========================================
    // 1. Web Audio API 轨道环境音合成器
    // ==========================================
    class MidnightSynth {
        constructor() {
            this.ctx = null;
            this.baseHum = [];
            this.baseHumGain = null;
            this.isPlaying = false;
            this.screechTimer = null;
            this.clickTimer = null;
            this.activeOscillators = [];
        }

        init() {
            if (this.ctx) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.warn("当前浏览器不支持 Web Audio API", e);
            }
        }

        start() {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            if (this.isPlaying) return;

            const osc1 = this.ctx.createOscillator();
            const osc2 = this.ctx.createOscillator();
            const humGain = this.ctx.createGain();
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(55, this.ctx.currentTime); 
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(55.3, this.ctx.currentTime); 

            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(80, this.ctx.currentTime);
            humGain.gain.setValueAtTime(0.06, this.ctx.currentTime); 

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(humGain);
            humGain.connect(this.ctx.destination);

            osc1.start();
            osc2.start();

            const lfo = this.ctx.createOscillator();
            const lfoGain = this.ctx.createGain();
            lfo.frequency.setValueAtTime(0.4, this.ctx.currentTime); 
            lfoGain.gain.setValueAtTime(0.015, this.ctx.currentTime);
            lfo.connect(lfoGain);
            lfoGain.connect(humGain.gain);
            lfo.start();

            this.baseHum = [osc1, osc2, lfo];
            this.baseHumGain = humGain;
            this.isPlaying = true;

            this.scheduleClickClack();
            this.scheduleScreech();
        }

        stop() {
            if (!this.isPlaying) return;
            if (this.baseHum.length) {
                this.baseHum.forEach(osc => { try { osc.stop(); } catch(e){} });
                this.baseHum = [];
            }
            if (this.activeOscillators.length) {
                this.activeOscillators.forEach(osc => { try { osc.stop(); } catch(e){} });
                this.activeOscillators = [];
            }
            clearTimeout(this.screechTimer);
            clearTimeout(this.clickTimer);
            this.isPlaying = false;
        }

        scheduleClickClack() {
            if (!this.isPlaying) return;
            this.clickTimer = setTimeout(() => {
                this.playClickClackSound();
                this.scheduleClickClack();
            }, 2500 + Math.random() * 2000);
        }

        playClickClackSound() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            this.triggerClick(now, 0.04);
            this.triggerClick(now + 0.12, 0.03);
            this.triggerClick(now + 0.35, 0.03);
        }

        triggerClick(time, volume) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(65, time);
            osc.frequency.exponentialRampToValueAtTime(10, time + 0.06);
            gain.gain.setValueAtTime(volume, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            this.activeOscillators.push(osc);
            osc.start(time);
            osc.stop(time + 0.07);
        }

        scheduleScreech() {
            if (!this.isPlaying) return;
            this.screechTimer = setTimeout(() => {
                this.playScreechSound();
                this.scheduleScreech();
            }, 14000 + Math.random() * 10000);
        }

        playScreechSound() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            const duration = 1.0 + Math.random() * 1.0;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.linearRampToValueAtTime(550, now + duration);
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(750, now);
            filter.Q.setValueAtTime(4, now);

            gain.gain.setValueAtTime(0.001, now);
            gain.gain.linearRampToValueAtTime(0.012, now + 0.3); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration); 

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            this.activeOscillators.push(osc);
            osc.start(now);
            osc.stop(now + duration);
        }
    }

    function unlockAudio() {
        synth.init();
        if (synth.ctx && synth.ctx.state === 'suspended') {
            synth.ctx.resume();
        }
    }

      death.classList.remove('on');

        }
    });

    function showScene(sceneKey) {
      unlockAudio(); 
      const node = STORY_NODES[sceneKey];
      if (!node) return;

      if (node.bg) {
        scene.style.backgroundImage = `url('${node.bg}')`;
      }

      // 死亡逻辑
      if (sceneKey.startsWith('death')) {
        death.classList.add('on');
        dot.style.color = '#e02626';
        statusTxt.innerText = '异常/已死亡';
        line.innerHTML = `<span class="r">${node.text}</span>`;
        
        optsBox.innerHTML = '<button class="vn-opt danger ultimate-restart" id="btn-restart">⚠️ 坠入深渊，点击此处循环重置 ⚠️</button>';
        document.getElementById('btn-restart').onclick = triggerReset;

        if (synth.isPlaying && synth.ctx) {
            const now = synth.ctx.currentTime;
            const osc = synth.ctx.createOscillator();
            const gain = synth.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 1.0);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
            osc.connect(gain);
            gain.connect(synth.ctx.destination);
            osc.start(now);
            osc.stop(now + 1.1);
        }
        return;
      }

      if (sceneKey === 'win_game') {
        dot.style.color = '#5a9a5a';
        statusTxt.innerText = '已安全';
        line.innerHTML = `<span class="g">${node.text}</span>`;
        optsBox.innerHTML = '<button class="vn-opt ultimate-restart" style="border-color:#5a9a5a !important; box-shadow: 0 0 20px rgba(100,223,223,0.6) !important; background: linear-gradient(180deg, #0a3a3a, #051a1a) !important;" id="btn-win-restart">✨ 成功生还！再来一局 ✨</button>';
        document.getElementById('btn-win-restart').onclick = triggerReset;
        return;
      }

      // 车厢名称同步
      if (sceneKey === 'car1_init' || sceneKey === 'car1_search') {
        nameTag.innerText = '车厢一 · 4:44';
      } else if (sceneKey === 'car2_transition') {
        nameTag.innerText = '车门交接处';
      } else if (sceneKey === 'car2_init') {
        nameTag.innerText = '车厢二 · 4:46';
      } else if (sceneKey === 'car3_init' || sceneKey === 'car3_heaven_glow') {
        nameTag.innerText = '车厢三 · 4:48';
      } else if (sceneKey === 'car3_heaven_survived') {
        nameTag.innerText = '车厢四 · 4:50';
      }

      line.innerHTML = node.text.replace(/\n/g, '<br>');

      // 生成选项
      optsBox.innerHTML = '';
      node.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'vn-opt';
        if (opt.text.includes('🚨') || opt.text.includes('💵')) {
          btn.classList.add('danger');
        }
        btn.innerText = opt.text;
        btn.onclick = () => showScene(opt.next);
        optsBox.appendChild(btn);
      });
      
      document.getElementById('vn-panel').scrollTop = 0;
    }

    showScene('car1_init');
  })();
  </script>
</div>
</body>
</html>
