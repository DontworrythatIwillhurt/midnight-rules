<div id="vn" style="position:relative; width:100vw; height:100vh; overflow:hidden; font-family:'Noto Serif SC',Georgia,serif; user-select:none; color:#e8dcc0;">

    #vn *{box-sizing:border-box;}

    /* 🏆 动态成就弹出提示框 🏆 */

    /* 死亡/通关重置键特效 */

    /* 🗺️ 剧情分支树/回溯节点排版 */
    .tree-title {

    .tree-grid {

    .tree-btn {

      padding: 6px 10px;

    .tree-btn:hover {

    #vn-auto{position:absolute;right:30px;bottom:100%;margin-bottom:6px;display:flex;gap:8px;}
    .vn-mini{font-size:11px;color:#a89670;border:1px solid #4a3f28;border-radius:14px;padding:4px 14px;background:rgba(0,0,0,.5);cursor:pointer;}
    
    /* 死亡爆发层 */
    #vn-death{position:absolute;inset:0;z-index:20;opacity:0;pointer-events:none;transition:opacity .1s;
      background:radial-gradient(circle at 50% 45%,rgba(170,15,15,.3),rgba(15,0,0,.97));}
    #vn-death.on{opacity:1;animation:vns .5s;}
    @keyframes vns{0%,100%{transform:translate(0,0)}25%{transform:translate(-4px,2px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-2px,-1px)}}
  </style>

  <div id="achievement-toast">

  </div>

  <div id="vn-box">
    <div id="vn-name">车厢一 · 4:44</div>
    <div id="vn-panel">
      <div id="vn-auto"><span class="vn-mini" id="toggle-ambient">音频: 关</span></div>
      <div id="vn-line">这节车厢坐满了人，却安静得没有一丝呼吸声。只有最角落那位穿<span class="r">红</span>的，背对着你——那片红，比周围<span class="r">暗了一号</span>。</div>
      <div id="vn-opts">
        <!-- 动态生成选项 -->
      </div>

  <div id="vn-death"></div>

  <script>
  (function(){
    // ==========================================
    // 1. Web Audio API 轨道环境音合成器
    // ==========================================
    class MidnightSynth {
        constructor() {
            this.ctx = null;
            this.baseHum = [];
            this.baseHumGain = null;
            this.isPlaying = false;
            this.screechTimer = null;
            this.clickTimer = null;
            this.activeOscillators = [];
        }

        init() {
            if (this.ctx) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.warn("当前浏览器不支持 Web Audio API", e);
            }
        }

        start() {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            if (this.isPlaying) return;

            const osc1 = this.ctx.createOscillator();
            const osc2 = this.ctx.createOscillator();
            const humGain = this.ctx.createGain();
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(55, this.ctx.currentTime); 
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(55.3, this.ctx.currentTime); 

            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(80, this.ctx.currentTime);
            humGain.gain.setValueAtTime(0.06, this.ctx.currentTime); 

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(humGain);
            humGain.connect(this.ctx.destination);

            osc1.start();
            osc2.start();

            const lfo = this.ctx.createOscillator();
            const lfoGain = this.ctx.createGain();
            lfo.frequency.setValueAtTime(0.4, this.ctx.currentTime); 
            lfoGain.gain.setValueAtTime(0.015, this.ctx.currentTime);
            lfo.connect(lfoGain);
            lfoGain.connect(humGain.gain);
            lfo.start();

            this.baseHum = [osc1, osc2, lfo];
            this.baseHumGain = humGain;
            this.isPlaying = true;

            this.scheduleClickClack();
            this.scheduleScreech();
        }

        stop() {
            if (!this.isPlaying) return;
            if (this.baseHum.length) {
                this.baseHum.forEach(osc => { try { osc.stop(); } catch(e){} });
                this.baseHum = [];
            }
            if (this.activeOscillators.length) {
                this.activeOscillators.forEach(osc => { try { osc.stop(); } catch(e){} });
                this.activeOscillators = [];
            }
            clearTimeout(this.screechTimer);
            clearTimeout(this.clickTimer);
            this.isPlaying = false;
        }

        scheduleClickClack() {
            if (!this.isPlaying) return;
            this.clickTimer = setTimeout(() => {
                this.playClickClackSound();
                this.scheduleClickClack();
            }, 2500 + Math.random() * 2000);
        }

        playClickClackSound() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            this.triggerClick(now, 0.04);
            this.triggerClick(now + 0.12, 0.03);
            this.triggerClick(now + 0.35, 0.03);
        }

        triggerClick(time, volume) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(65, time);
            osc.frequency.exponentialRampToValueAtTime(10, time + 0.06);
            gain.gain.setValueAtTime(volume, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            this.activeOscillators.push(osc);
            osc.start(time);
            osc.stop(time + 0.07);
        }

        scheduleScreech() {
            if (!this.isPlaying) return;
            this.screechTimer = setTimeout(() => {
                this.playScreechSound();
                this.scheduleScreech();
            }, 14000 + Math.random() * 10000);
        }

        playScreechSound() {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            const now = this.ctx.currentTime;
            const duration = 1.0 + Math.random() * 1.0;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.linearRampToValueAtTime(550, now + duration);
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(750, now);
            filter.Q.setValueAtTime(4, now);

            gain.gain.setValueAtTime(0.001, now);
            gain.gain.linearRampToValueAtTime(0.012, now + 0.3); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration); 

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            this.activeOscillators.push(osc);
            osc.start(now);
            osc.stop(now + duration);
        }
    }

    const synth = new MidnightSynth();

    // ==========================================
    // 2. 🏆 存档与成就持久化系统 (Save System) 🏆
    // ==========================================
    const SAVE_KEY = "midnight_rules_save_v2";
    let gameState = {
      has_note: false,       
      has_badge: false,      
      deaths_count: 0,       
      runs_completed: 0,     
      achievements: []       
    };

    const localData = localStorage.getItem(SAVE_KEY);
    if (localData) {
      try {
        gameState = { ...gameState, ...JSON.parse(localData) };
      } catch(e) {}
    }

    function saveGame() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(gameState));
    }

    const ACHIEVEMENT_LIST = {
      FIRST_DEATH: { name: "初识深渊 💀", desc: "第一次在这辆列车上迎来死亡。" },
      COLLECT_NOTE: { name: "规则守护者 📜", desc: "在座椅下发现了那张撕碎的警告纸条。" },
      COLLECT_BADGE: { name: "拾荒奇才 🏷️", desc: "成功拿到了乘务员生前掉落的旧工牌。" },
      RED_TALK: { name: "好奇害死猫 🚨", desc: "强行和红衣乘客说话，触发了未知的灵异现象。" },
      TRUE_WIN: { name: "终极救赎 🏆", desc: "集齐所有线索，逃离莫比乌斯环，达成真结局。" }
    };

    function unlockAchievement(id) {
      if (!gameState.achievements.includes(id)) {
        gameState.achievements.push(id);
        saveGame();
        const toast = document.getElementById('achievement-toast');
        document.getElementById('achievement-name').innerText = ACHIEVEMENT_LIST[id].name;
        toast.classList.add('show');
        
        // 视觉微震动，增强解锁成就时的实感
        document.getElementById('vn').animate([
          { transform: 'translate(1px, 1px) rotate(0deg)' },
          { transform: 'translate(-1px, -2px) rotate(-1deg)' },
          { transform: 'translate(-3px, 0px) rotate(1deg)' },
          { transform: 'translate(0px, 2px) rotate(0deg)' }
        ], { duration: 150 });

        setTimeout(() => {
          toast.classList.remove('show');
        }, 4000);
      }
    }

    document.getElementById('btn-achievements').onclick = () => {
      let listStr = "🏆 【我的成就馆】 🏆\n---------------------\n";
      Object.keys(ACHIEVEMENT_LIST).forEach(key => {
        const has = gameState.achievements.includes(key);
        listStr += `${has ? '✅' : '🔒'} ${ACHIEVEMENT_LIST[key].name} : ${ACHIEVEMENT_LIST[key].desc}\n`;
      });
      listStr += `\n累计死亡次数: ${gameState.deaths_count} | 通关次数: ${gameState.runs_completed}`;
      alert(listStr);
    };

    // ==========================================
    // 3. 📖 深度剧情树 (图片路径改用本地相对路径) 📖
    // ==========================================
    const STORY_NODES = {
      car1_init: {
        bg: "red_figure.png",
        text: () => {
          let base = "你不记得自己是什么时候上的车。\n\n车厢里的挂钟停在 4:44。窗外是看不见尽头的漆黑，列车却一直在动。\n\n这节车厢坐满了人，却安静得没有一丝呼吸声。所有人都低着头仿佛在打瞌睡。只有角落那一个，穿着一身红，背对着你。那身红，比周围暗了一号。";
          if (gameState.deaths_count > 0) {
            base += `\n\n<span class="r">（隐约中，你感觉这令人窒息的场景，你已经经历过 ${gameState.deaths_count} 次了……）</span>`;
          }
          return base;
        },
        options: () => {
          return [
            { text: "🔍 借着昏暗的灯光，摸一摸座椅下压着的东西", next: "car1_search" },
            { text: "🚪 离红衣人远点，拉开连接门去下一节车厢", next: "car2_transition" },
            { text: "🚨 走过去，拍拍红衣乘客的肩膀问句路", next: "death_red" }
          ];
        }
      },
      car1_search: {
        bg: "subway_bg.png",
        text: () => "你在座椅夹缝下摸到了一张揉成一团的碎纸条。上面写着一行字：\n\n『……如果推车来的时候，千万不要买票。因为他们卖的，从来都不是票。另外……红衣乘客很冷，但他害怕极度寒冷的地方，或许……』",
        options: () => {
          if (!gameState.has_note) {
            gameState.has_note = true;
            saveGame();
            setTimeout(() => { unlockAchievement('COLLECT_NOTE'); }, 1000);
          }
          return [
            { text: "🚪 迅速收好纸条，去下一节车厢", next: "car2_transition" },
            { text: "🚨 忽略警告，走过去拍拍红衣乘客的肩膀", next: "death_red" }
          ];
        }
      },
      car2_transition: {
        bg: "tunnel_bg.png",
        text: () => "你拉开沉重的舱门，踏入了两节车厢剧烈晃动的连接处。风在钢骨缝隙中哭嚎。\n\n低头看去，连接处的铁板缝隙里，卡着一枚生锈的【列车员乘务工牌】。上面依稀写着：『车厢工号：04』，还沾着一滴干涸的血。要捡起来吗？",
        options: () => {
          return [
            { text: "🏷️ 捡起并收好乘务工牌", next: "car2_transition_badge" },
            { text: "🚪 不管它，推开眼前的防撬门进入车厢二", next: "car2_init" }
          ];
        }
      },
      car2_transition_badge: {
        bg: "tunnel_bg.png",
        text: () => "你捡起了那枚冰冷的乘务工牌。冰凉的铁质触感让你不自觉打了个寒颤。这上面或许承载着某些未散的怨念……",
        options: () => {
          if (!gameState.has_badge) {
            gameState.has_badge = true;
            saveGame();
            setTimeout(() => { unlockAchievement('COLLECT_BADGE'); }, 1000);
          }
          return [
            { text: "🚪 推开眼前的防撬门进入车厢二", next: "car2_init" }
          ];
        }
      },
      car2_init: {
        bg: "seller_bg.png",
        text: () => {
          let base = "你跨过连接处来到了【第二节车厢】。\n\n这里的空气更冷了，车顶不断渗出黏糊糊的液体。角落里依然坐着那个红衣乘客，但他坐的位置，似乎比刚才更靠近连接门了……\n\n突然，售货车滑行了过来。乘务员咧开惨白的嘴角：“要买票吗……有票的人才能下车……”";
          if (gameState.has_badge) {
            base += "\n\n<span class=\"gold\">（你怀里的乘务工牌此时在微微发热发烫……）</span>";
          }
          return base;
        },
        options: () => {
          const opts = [];
          if (gameState.has_note) {
            opts.push({ text: "🚪 脑海里闪过纸条的警告，冷淡地拒绝买票", next: "car3_init" });
          } else {
            opts.push({ text: "🚪 摇头拒绝他，直接走向第三节车厢", next: "car3_init" });
          }
          if (gameState.has_badge) {
            opts.push({ text: "🏷️ 出示你刚才捡到的工牌，低声说：『工号04，你已经到站了。』", next: "car2_badge_survive" });
          }
          opts.push({ text: "💵 看起来很重要，买一张车票", next: "death_seller" });
          return opts;
        }
      },
      car2_badge_survive: {
        bg: "seller_bg.png",
        text: () => "乘务员浑浊无神的双眼死死盯着那枚工牌。他的神情突然变得极度痛苦，空洞的嘴里发出沙哑的哀嚎：『04号……是我……原来我已经死在了那场事故里……』\n\n售货车散落成了漫天的灰烬。他留下一句颤抖的警告：『……不要拉阀门……拉了阀门，列车才会醒过来……』",
        options: () => {
          return [
            { text: "🚪 怀揣着新的秘密，穿过空荡的车厢前往车厢三", next: "car3_init" }
          ];
        }
      },
      car3_init: {
        bg: "scratching_window.png",
        text: () => "你来到了【第三节车厢】，头顶的灯开始疯狂闪烁！\n车窗外突然有无数只惨白枯槁的手死死贴在玻璃上，发出令人牙酸的疯狂拍击与抓挠声！\n\n突然广播响起：“下一站……天堂站。请下车的旅客准备……”",
        options: () => {
          const opts = [
            { text: "🙈 闭上眼睛，紧紧捂住耳朵，什么也不看", next: "car3_heaven_glow" },
            { text: "🪟 惊慌失措，朝窗外看去寻找逃生出口", next: "death_window" }
          ];
          if (gameState.has_note) {
            opts.push({ text: "🥶 利用纸条规则：红衣人极怕冷，紧紧贴到红衣人身旁借其阴气屏蔽外界", next: "car3_red_survive" });
          }
          return opts;
        }
      },
      car3_red_survive: {
        bg: "red_figure.png",
        text: () => "你顶着刺骨的阴凉，一把抱住缩在角落里的红衣人。那身红衣散发出了比干冰还要彻骨十倍的冷气，你感觉全身的血液几乎都要冻结。\n\n然而，当外面拍窗的无数双惨白断手企图击穿玻璃时，在接触到这股极致阴寒的一瞬间，竟仿佛触电般痛苦地缩了回去！红衣人幽幽地侧过头，用完全没有眼白的声音对你轻语：『……好冷……谢谢你，陪着我……』",
        options: () => {
          return [
            { text: "🚪 乘外面那些鬼手退去，迅速拉开门前往第四车厢", next: "car3_heaven_survived" }
          ];
        }
      },
      car3_heaven_glow: {
        bg: "heaven_station.png",
        text: () => "你闭上双眼！强光和刺耳的“天堂站”报站广播几乎穿透了你的耳膜。整节车厢仿佛飘进了耀眼、滚烫却阴凉的白雾之中，窗外全是刺目的白色微尘！\n\n你强忍着想要睁眼窥探的冲动，默数着心跳……",
        options: () => {
          return [
            { text: "🚪 听到刹车风管排气声后，慢慢睁开眼挪向前方车厢", next: "car3_heaven_survived" }
          ];
        }
      },
      car3_heaven_survived: {
        bg: "brake_lever.png",
        text: () => {
          let base = "雾气散去。你睁开眼，已经来到了【第四节车厢】。这里一片死寂，前面的【驾驶室】门旁挂着一个巨大的红色【紧急制动阀】。";
          if (gameState.has_note && gameState.has_badge) {
            base += "\n\n<span class=\"gold\">（目前你集齐了：[纸条] 和 [工牌]。脑海中，售票员和红衣乘客的话交相呼应。事情似乎并没有拉下阀门那么简单……）</span>";
          }
          return base;
        },
        options: () => {
          const opts = [
            { text: "🛑 闭上眼睛，凭感觉死死拉下制动阀", next: "win_normal" },
            { text: "👀 睁大眼睛看清局势，再去拉制动阀", next: "death_final" }
          ];
          if (gameState.has_note && gameState.has_badge) {
            opts.push({ text: "🌀 看穿谎言：任凭冷风吹拂，拒绝拉下制动阀，静坐等待列车自行停下", next: "win_true" });
          }
          return opts;
        }
      },
      win_normal: {
        bg: "win_subway.png", 
        text: () => {
          gameState.runs_completed++;
          saveGame();
          return "【正常结局 - 破碎梦魇】\n\n刺耳的刹车声响彻整列车厢，那些低语、阴冷和鬼影瞬间化为粉碎。\n\n暖洋洋的阳光洒在你脸上，车门缓缓打开，外面是阳光明媚的普通地铁站。广播里传来干净的声音：『终点站到了，欢迎回家。』\n\n你松了一口气走下车。然而，当你下意识伸手入怀，却摸到了那张在车厢里捡到的、揉成一团的碎纸条。上面不知何时多了一行滴血的字：\n\n『……不要相信阳光，这里，其实是第五节车厢。』";
        },
        options: () => []
      },
      win_true: {
        bg: "unspeakable_entity.png", 
        text: () => {
          gameState.runs_completed++;
          saveGame();
          setTimeout(() => { unlockAchievement('TRUE_WIN'); }, 1000);
          return "【真结局 - 莫比乌斯解脱】\n\n你双手抱胸，静静地靠在座椅上。周围的鬼哭狼嚎、甚至顶灯的闪烁都开始疯狂地撕扯你的理智。但是，你记起了乘务员死前的哭诉——拉动阀门，这辆庞然大物才会醒来捕猎！\n\n终于，4:55，伴随一声沉闷的空气排气声，列车竟缓缓停稳了。窗外的漆黑像潮水般退去，取而代之的是你熟悉的清晨街道。\n\n红衣乘客缓缓起身，第一次转过头——那是一张清秀、温和的普通女学生脸庞。她向你深深鞠了一躬，和满车化为白雾 of 乘客一起飘散远去。你推开没有上锁的列车门，真正踏上了人间的土地。游戏通关！";
        },
        options: () => []
      },
      death_red: {
        bg: "unspeakable_entity.png",
        text: () => {
          setTimeout(() => { unlockAchievement('RED_TALK'); }, 1000);
          return "【死亡 - 红色禁忌】\n\n那身红缓缓转了过来。你先看见的不是脸，是笑——一个咧到耳根、却没有眼睛的笑。你感觉自己的身体迅速变冷，也变成了一具无法呼吸、只能低头坐在车厢里的雕塑……";
        },
        options: () => []
      },
      death_seller: {
        bg: "unspeakable_entity.png",
        text: () => "【死亡 - 车票陷阱】\n\n乘务员咧开嘴笑了，那是一张属于溺死之人的苍白脸庞。你递过去的钱瞬间变成了冥币，你拿到的车票迅速在你的皮肤上蔓延成焦黑的灰烬。你成为了列车的新燃料。",
        options: () => []
      },
      death_window: {
        bg: "unspeakable_entity.png",
        text: () => "【死亡 - 窥视深渊】\n\n当你望向窗外的一瞬间，车窗上的白手猛地击碎了玻璃！无数冰冷的手瞬间死死扼住了你的喉咙，将你拽入了窗外无尽的深渊黑暗中……",
        options: () => []
      },
      death_final: {
        bg: "unspeakable_entity.png",
        text: () => "【死亡 - 功亏一篑】\n\n你睁开了双眼。黑暗中无数张扭曲撕裂的鬼脸贴在你眼前，尖叫着冲入你的眼眶。你的手在碰到阀门的一瞬间彻底失去了温度……",
        options: () => []
      }
    };

    const scene = document.getElementById('vn-scene');
    const death = document.getElementById('vn-death');
    const line = document.getElementById('vn-line');
    const dot = document.getElementById('vn-dot');
    const statusTxt = document.getElementById('status-txt');
    const nameTag = document.getElementById('vn-name');
    const optsBox = document.getElementById('vn-opts');
    const toggleAmbient = document.getElementById('toggle-ambient');
    const btnTopReset = document.getElementById('vn-skip');

    const welcomeScreen = document.getElementById('vn-welcome');
    const btnEnter = document.getElementById('btn-enter');

    // 🚀 点击检票，完美解锁并激活音频
    btnEnter.addEventListener('click', () => {
      synth.init();
      synth.start();
      toggleAmbient.innerText = "音频: 开";
      
      // 淡出遮罩层
      welcomeScreen.style.opacity = '0';
      setTimeout(() => {
        welcomeScreen.style.display = 'none';
      }, 800);
    });

    function unlockAudio() {
        synth.init();
        if (synth.ctx && synth.ctx.state === 'suspended') {
            synth.ctx.resume();
        }
    }

    function triggerReset() {
      death.classList.remove('on');
      dot.style.color = '#5a9a5a';
      statusTxt.innerText = '安全';
      showScene('car1_init');
    }

    btnTopReset.onclick = triggerReset;

    toggleAmbient.addEventListener('click', () => {
        unlockAudio(); 
        if (synth.isPlaying) {
            synth.stop();
            toggleAmbient.innerText = "音频: 关";
        } else {
            synth.start();
            toggleAmbient.innerText = "音频: 开";
        }
    });

    let textTimer = null;
    function typeWriter(element, text, speed, callback) {
      element.innerHTML = "";
      let i = 0;
      
      function type() {
        if (i < text.length) {
          if (text.charAt(i) === '<') {
            let tagEnd = text.indexOf('>', i);
            if (tagEnd !== -1) {
              element.innerHTML += text.substring(i, tagEnd + 1);
              i = tagEnd + 1; 
            } else {
              element.innerHTML += text.charAt(i);
              i++;
            }
          } else {
            element.innerHTML += text.charAt(i);
            i++;
          }
          textTimer = setTimeout(type, speed);
        } else if (callback) {
          callback();
        }
      }
      type();
    }

    function showScene(sceneKey) {
      unlockAudio(); 
      clearTimeout(textTimer); 
      
      const node = STORY_NODES[sceneKey];
      if (!node) return;

      const currentBg = typeof node.bg === 'function' ? node.bg() : node.bg;
      if (currentBg) {
        scene.style.backgroundImage = `url('${currentBg}')`;
      }

      const parsedText = typeof node.text === 'function' ? node.text() : node.text;

      if (sceneKey.startsWith('death')) {
        gameState.deaths_count++;
        saveGame();
        setTimeout(() => { unlockAchievement('FIRST_DEATH'); }, 1500);

        death.classList.add('on');
        dot.style.color = '#e02626';
        statusTxt.innerText = '异常/已死亡';
        
        typeWriter(line, parsedText, 10, () => {
          optsBox.innerHTML = '<button class="vn-opt danger ultimate-restart" id="btn-restart">⚠️ 坠入深渊，点击此处循环重置 ⚠️</button>';
          document.getElementById('btn-restart').onclick = triggerReset;
        });

        if (synth.isPlaying && synth.ctx) {
            const now = synth.ctx.currentTime;
            const osc = synth.ctx.createOscillator();
            const gain = synth.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 1.0);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
            osc.connect(gain);
            gain.connect(synth.ctx.destination);
            osc.start(now);
            osc.stop(now + 1.1);
        }
        return;
      }

      optsBox.innerHTML = ''; 
      const safeText = parsedText.replace(/\n/g, '<br>');
      
      typeWriter(line, safeText, 15, () => {
        if (sceneKey === 'win_normal' || sceneKey === 'win_true') {
          dot.style.color = '#5a9a5a';
          statusTxt.innerText = '已安全';
          
          optsBox.innerHTML = `
            <button class="vn-opt ultimate-restart" style="border-color:#5a9a5a !important; box-shadow: 0 0 20px rgba(100,223,223,0.6) !important; background: linear-gradient(180deg, #0a3a3a, #051a1a) !important;" id="btn-win-restart">✨ 重新回到循环起点 ✨</button>
            <div class="tree-title">🌀 量子纠缠 · 剧情节点回溯</div>
            <div class="tree-grid">
              <button class="tree-btn" onclick="window.jumpToScene('car1_init')">📍 初始车厢一 (4:44)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car2_transition')">📍 车门交接 (工牌)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car2_init')">📍 诡异车厢二 (买票)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car3_init')">📍 尖叫车厢三 (鬼手)</button>
              <button class="tree-btn" onclick="window.jumpToScene('car3_heaven_survived')">📍 判定车厢四 (制动)</button>
            </div>
          `;
          document.getElementById('btn-win-restart').onclick = triggerReset;
          return;
        }

        const options = typeof node.options === 'function' ? node.options() : node.options;
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'vn-opt';
          if (opt.text.includes('🚨') || opt.text.includes('💵')) {
            btn.classList.add('danger');
          }
          btn.innerHTML = opt.text;
          btn.onclick = () => showScene(opt.next);
          optsBox.appendChild(btn);
        });
      });

      if (sceneKey === 'car1_init' || sceneKey === 'car1_search') {
        nameTag.innerText = '车厢一 · 4:44';
      } else if (sceneKey === 'car2_transition' || sceneKey === 'car2_transition_badge') {
        nameTag.innerText = '车门交接处';
      } else if (sceneKey === 'car2_init' || sceneKey === 'car2_badge_survive') {
        nameTag.innerText = '车厢二 · 4:46';
      } else if (sceneKey === 'car3_init' || sceneKey === 'car3_heaven_glow' || sceneKey === 'car3_red_survive') {
        nameTag.innerText = '车厢三 · 4:48';
      } else if (sceneKey === 'car3_heaven_survived') {
        nameTag.innerText = '车厢四 · 4:50';
      }
      
      document.getElementById('vn-panel').scrollTop = 0;
    }

    window.jumpToScene = function(sceneKey) {
      death.classList.remove('on');
      dot.style.color = '#5a9a5a';
      statusTxt.innerText = 'safe';
      showScene(sceneKey);
    };

    showScene('car1_init');
  })();
  </script>
</div>
</body>
